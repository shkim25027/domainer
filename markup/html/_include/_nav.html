<script>
  (function () {
    var current = (location.pathname.split('/').pop() || location.href.split('/').pop()).split('?')[0].toLowerCase();
    function setDepthIcon(li, isOn) {
      var ico = li.querySelector(':scope > a > .nav-ico img');
      if (!ico) return;
      ico.src = isOn
        ? ico.src.replace(/ico_nav_\w+\.svg/, 'ico_nav_setting_on.svg')
        : ico.src.replace('ico_nav_setting_on.svg', 'ico_nav_setting.svg');
    }

    document.querySelectorAll('.has-depth > a').forEach(function (a) {
      a.addEventListener('click', function (e) {
        e.preventDefault();
        var li = a.parentElement;
        var isOpen = li.classList.toggle('open');
        setDepthIcon(li, isOpen);
      });
    });

    document.querySelectorAll('.nav-menu a').forEach(function (a) {
      var href = a.getAttribute('href');
      if (!href || href === '#') return;
      var hrefFile = href.split('/').pop().split('?')[0].toLowerCase();
      if (hrefFile && hrefFile === current) {
        var li = a.parentElement;
        li.classList.add('active');
        var parentUl = li.parentElement;
        if (parentUl && parentUl.classList.contains('depth02')) {
          var parentLi = parentUl.parentElement;
          if (parentLi) {
            parentLi.classList.add('active');
            if (parentLi.classList.contains('has-depth')) {
              setDepthIcon(parentLi, true);
            }
          }
        }
      }
    });
  })();
</script>
