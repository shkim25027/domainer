<!DOCTYPE html>
<html lang="ko">
  <head>
    @@include("_include/_head.html")
    <title>컴포넌트 가이드 — Domainer</title>
    <style>
      .container {
        max-width: 100%;
        min-height: 100vh;
        height: auto;
      }
      .guide { width: 100%; max-width: 100%; margin: 0 auto; padding: 2rem 1.5rem; }
      .guide h1 { font-size: 2rem; margin: 0 0 2rem; color: var(--text-title); }
      .guide-section {
        padding: 1.5rem 2rem;
        margin-bottom: 2rem;
        background: #fff;
        border-radius: 8px;
        border: 1px solid var(--border-base, #e5e7eb);
      }
      .guide-section:last-of-type { margin-bottom: 0; }
      .guide-section h2 { font-size: 1.5rem; margin: 0 0 1.25rem; color: var(--text-title); font-weight: 600; }
      .guide-section h3 { font-size: 1.125rem; margin: 1.25rem 0 0.75rem; color: var(--text-title); font-weight: 600; }
      .guide-section h3:first-of-type { margin-top: 0; }
      .guide-grid {
        display: grid;
        grid-template-columns: 20% 80%;
        gap: 2rem;
        width: 100%;
      }
      .guide-grid-item {
        padding: 1.5rem 2rem;
      }
      .guide-row { display: flex; flex-wrap: wrap; align-items: center; gap: 1rem; margin-bottom: 1rem; }
      .guide-row:last-child { margin-bottom: 0; }
      .guide-label { min-width: 160px; font-size: 0.8125rem; color: var(--text-tertiary); }
      .guide-items { display: flex; flex-wrap: wrap; align-items: center; gap: 0.75rem 1rem; }
      .skip-link {
        position: absolute;
        top: -10rem;
        left: 1rem;
        z-index: 9999;
        padding: 0.75rem 1rem;
        background: var(--text-primary, #246beb);
        color: #fff;
        font-size: 0.875rem;
        text-decoration: none;
        border-radius: 4px;
        transition: top 0.2s;
      }
      .skip-link:focus {
        top: 1rem;
        outline: 3px solid currentColor;
        outline-offset: 2px;
      }
      .card-title { margin: 0; font: inherit; font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="wrap">
      @@include("_include/_sidebar.html")
      <div class="container">
        <main id="guide-main" class="guide" role="main" aria-label="컴포넌트 가이드">
          <h1>컴포넌트 가이드 — 한눈에 보기</h1>
          <!-- 1. 폰트 사이즈-->
          <section class="guide-section" aria-labelledby="guide-font-size-heading">
            <h2 id="guide-font-size-heading">1. 폰트 사이즈</h2>
            <div class="guide-row">
              <div class="guide-items">
                <div>
                  <h1 class="text-title-1">title h1 - 32px</h1>
                  <h2 class="text-title-2">title h2 - 24px</h2>
                  <h3 class="text-title-3" style="color: var(--text-title);">title h3 - 18px</h3>
                  <p class="text-lg">p - 16px</p>
                  <p class="text-base">p - 14px</p>
                  <p class="text-sm">p - 13px</p>
                  <p class="text-xs">p - 12px</p>
                </div>
              </div>
            </div>
          </section>

          <!-- 2. 입력 필드 -->
          <section class="guide-section" aria-labelledby="guide-input-heading">
            <h2 id="guide-input-heading">2. 입력 필드 (Input)</h2>
            <h3>기본</h3>
            <div class="form-group">
              <label class="label" for="g-input1">이름</label>
              <input type="text" id="g-input1" class="input input-md" placeholder="이름을 입력하세요" autocomplete="name">
            </div>
            <h3>사이즈</h3>
            <div class="guide-row">
              <div class="guide-items">
                <input type="text" class="input input-sm" placeholder="Small" aria-label="Small 크기 입력">
                <input type="text" class="input input-md" placeholder="Medium" aria-label="Medium 크기 입력">
                <input type="text" class="input input-lg" placeholder="Large" aria-label="Large 크기 입력">
              </div>
            </div>
            <h3>상태</h3>
            <div class="guide-row">
              <div class="guide-items">
                <input type="text" class="input input-md input-error" placeholder="Error" aria-label="오류 상태 예시" aria-invalid="true">
                <input type="text" class="input input-md input-success" value="Success" aria-label="성공 상태 예시">
                <input type="text" class="input input-md" placeholder="Disabled" disabled aria-label="비활성화 상태 예시">
              </div>
            </div>
            <h3>Textarea · Select</h3>
            <div class="form-group">
              <label class="label" for="g-textarea1">메시지</label>
              <textarea id="g-textarea1" class="textarea" placeholder="메시지를 입력하세요" rows="3" aria-describedby="g-textarea-desc"></textarea>
              <span id="g-textarea-desc" class="help-text" hidden>3줄 이상 입력 가능</span>
            </div>
            <div class="form-group">
              <label class="label" for="g-select1">옵션</label>
              <select id="g-select1" class="select select-md" aria-label="옵션 선택">
                <option value="">선택하세요</option>
                <option value="1">옵션 1</option>
                <option value="2">옵션 2</option>
              </select>
            </div>
          </section>

          <!-- 1. 버튼 --/>
          <section class="guide-section" aria-labelledby="guide-btn-heading">
            <div class="guide-grid">
              <div class="guide-grid-item">
                <h2 id="guide-btn-heading">1. 버튼 (Button)</h2>
              </div>
              <div class="guide-grid-item">
                <h3>기본 스타일</h3>
                <div class="guide-row">
                  <div class="guide-items">
                    <button type="button" class="btn btn-primary btn-md">Primary</button>
                    <button type="button" class="btn btn-secondary btn-md">Secondary</button>
                    <button type="button" class="btn btn-success btn-md">Success</button>
                    <button type="button" class="btn btn-warning btn-md">Warning</button>
                    <button type="button" class="btn btn-danger btn-md">Danger</button>
                    <button type="button" class="btn btn-outline btn-md">Outline</button>
                    <button type="button" class="btn btn-ghost btn-md">Ghost</button>
                    <button type="button" class="btn btn-link btn-md">Link</button>
                  </div>
                </div>
                <h3>사이즈</h3>
                <div class="guide-row">
                  <div class="guide-items">
                    <button type="button" class="btn btn-primary btn-sm">Small</button>
                    <button type="button" class="btn btn-primary btn-md">Medium</button>
                    <button type="button" class="btn btn-primary btn-lg">Large</button>
                  </div>
                </div>
                <h3>상태</h3>
                <div class="guide-row">
                  <div class="guide-items">
                    <button type="button" class="btn btn-primary btn-md" disabled>Disabled</button>
                    <button type="button" class="btn btn-primary btn-md btn-loading" aria-busy="true" aria-label="처리 중">Loading</button>
                    <button type="button" class="btn btn-primary btn-md btn-block">Full Width</button>
                  </div>
                </div>
                <h3>아이콘 버튼</h3>
                <div class="guide-row">
                  <div class="guide-items">
                    <button type="button" class="btn btn-primary btn-icon btn-md" aria-label="추가">+</button>
                    <button type="button" class="btn btn-secondary btn-icon btn-md" aria-label="닫기">×</button>
                    <button type="button" class="btn btn-outline btn-icon btn-md btn-rounded" aria-label="좋아요">♥</button>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <!-- 2. 뱃지 --/>
          <section class="guide-section" aria-labelledby="guide-badge-heading">
            <h2 id="guide-badge-heading">2. 뱃지 (Badge)</h2>
            <div class="guide-row">
              <div class="guide-items">
                <span class="badge badge-default">기본</span>
                <span class="badge badge-primary">Primary</span>
                <span class="badge badge-success">성공</span>
                <span class="badge badge-warning">경고</span>
                <span class="badge badge-danger">위험</span>
                <span class="badge badge-outline">아웃라인</span>
              </div>
            </div>
          </section>



          <!-- 4. 체크박스 --/>
          <section class="guide-section" aria-labelledby="guide-checkbox-heading">
            <h2 id="guide-checkbox-heading">4. 체크박스 (Checkbox)</h2>
            <h3>기본</h3>
            <div class="checkbox-group">
              <label class="checkbox">
                <input type="checkbox" class="checkbox-input">
                <span class="checkbox-box"></span>
                <span class="checkbox-label">동의합니다</span>
              </label>
              <label class="checkbox">
                <input type="checkbox" class="checkbox-input" checked>
                <span class="checkbox-box"></span>
                <span class="checkbox-label">선택됨</span>
              </label>
              <label class="checkbox">
                <input type="checkbox" class="checkbox-input" disabled>
                <span class="checkbox-box"></span>
                <span class="checkbox-label">비활성화</span>
              </label>
            </div>
            <h3>스위치</h3>
            <div class="checkbox-group">
              <label class="checkbox checkbox-switch">
                <input type="checkbox" class="checkbox-input">
                <span class="checkbox-box"></span>
                <span class="checkbox-label">알림 받기</span>
              </label>
              <label class="checkbox checkbox-switch">
                <input type="checkbox" class="checkbox-input" checked>
                <span class="checkbox-box"></span>
                <span class="checkbox-label">자동 저장</span>
              </label>
            </div>
            <h3>색상 변형</h3>
            <div class="checkbox-group checkbox-group-inline">
              <label class="checkbox">
                <input type="checkbox" class="checkbox-input" checked>
                <span class="checkbox-box"></span>
                <span class="checkbox-label">Primary</span>
              </label>
              <label class="checkbox checkbox-success">
                <input type="checkbox" class="checkbox-input" checked>
                <span class="checkbox-box"></span>
                <span class="checkbox-label">Success</span>
              </label>
              <label class="checkbox checkbox-danger">
                <input type="checkbox" class="checkbox-input" checked>
                <span class="checkbox-box"></span>
                <span class="checkbox-label">Danger</span>
              </label>
            </div>
          </section>

          <!-- 5. 라디오 --/>
          <section class="guide-section" aria-labelledby="guide-radio-heading">
            <h2 id="guide-radio-heading">5. 라디오 (Radio)</h2>
            <h3>기본</h3>
            <div class="radio-group" role="radiogroup" aria-label="옵션 선택">
              <label class="radio">
                <input type="radio" name="g-radio1" class="radio-input" checked>
                <span class="radio-button"></span>
                <span class="radio-label">옵션 1</span>
              </label>
              <label class="radio">
                <input type="radio" name="g-radio1" class="radio-input">
                <span class="radio-button"></span>
                <span class="radio-label">옵션 2</span>
              </label>
              <label class="radio">
                <input type="radio" name="g-radio1" class="radio-input" disabled>
                <span class="radio-button"></span>
                <span class="radio-label">비활성화</span>
              </label>
            </div>
            <h3>버튼 스타일</h3>
            <div class="radio-group radio-group-buttons" role="radiogroup" aria-label="기간 선택">
              <label class="radio radio-button-style">
                <input type="radio" name="g-radio2" class="radio-input" checked>
                <span class="radio-button"></span>
                <span class="radio-label">일간</span>
              </label>
              <label class="radio radio-button-style">
                <input type="radio" name="g-radio2" class="radio-input">
                <span class="radio-button"></span>
                <span class="radio-label">주간</span>
              </label>
              <label class="radio radio-button-style">
                <input type="radio" name="g-radio2" class="radio-input">
                <span class="radio-button"></span>
                <span class="radio-label">월간</span>
              </label>
            </div>
            <h3>세그먼트 컨트롤</h3>
            <div class="segmented-control" role="radiogroup" aria-label="필터 구간">
              <label class="radio">
                <input type="radio" name="g-radio3" class="radio-input" checked>
                <span class="radio-button"></span>
                <span class="radio-label">전체</span>
              </label>
              <label class="radio">
                <input type="radio" name="g-radio3" class="radio-input">
                <span class="radio-button"></span>
                <span class="radio-label">진행중</span>
              </label>
              <label class="radio">
                <input type="radio" name="g-radio3" class="radio-input">
                <span class="radio-button"></span>
                <span class="radio-label">완료</span>
              </label>
            </div>
          </section>

          <!-- 6. 카드 · 태그 --/>
          <section class="guide-section" aria-labelledby="guide-card-heading">
            <h2 id="guide-card-heading">6. 카드 · 태그 (Card · Tag)</h2>
            <div class="tags" role="list">
              <span class="tag" role="listitem">태그1</span>
              <span class="tag" role="listitem">태그2</span>
            </div>
            <article class="card" style="max-width: 100%;">
              <header class="card-header">
                <h3 class="card-title">카드 헤더</h3>
              </header>
              <div class="card-body">
                <div class="info">
                  <span class="name">이름</span>
                  <span class="badge">📞 010-0000-0000</span>
                </div>
                <p class="desc">설명 텍스트. <strong class="highlight">강조</strong></p>
              </div>
            </article>
          </section>

          <!-- 7. 탭 --/>
          <section class="guide-section" aria-labelledby="guide-tabs-heading">
            <h2 id="guide-tabs-heading">7. 탭 (Tabs)</h2>
            <h3>세그먼트 탭</h3>
            <div class="tabs" role="tablist" aria-label="검토 정보 탭">
              <button type="button" class="tab active" role="tab" aria-selected="true" aria-controls="tab-panel-1" id="tab-1">기본정보</button>
              <button type="button" class="tab" role="tab" aria-selected="false" aria-controls="tab-panel-2" id="tab-2">담당자정보</button>
              <button type="button" class="tab" role="tab" aria-selected="false" aria-controls="tab-panel-3" id="tab-3">첨부파일</button>
            </div>
            <div id="tab-panel-1" role="tabpanel" aria-labelledby="tab-1" tabindex="0" hidden>기본정보 패널 (데모)</div>
            <div id="tab-panel-2" role="tabpanel" aria-labelledby="tab-2" tabindex="0" hidden>담당자정보 패널 (데모)</div>
            <div id="tab-panel-3" role="tabpanel" aria-labelledby="tab-3" tabindex="0" hidden>첨부파일 패널 (데모)</div>
            <h3>Pill 탭</h3>
            <div class="tabs tabs-pills" role="tablist" aria-label="목록 필터">
              <button type="button" class="tab active" role="tab" aria-selected="true">전체 (100)</button>
              <button type="button" class="tab" role="tab" aria-selected="false">처리중 (50)</button>
              <button type="button" class="tab" role="tab" aria-selected="false">종결 (50)</button>
            </div>
          </section>

          <!-- 8. 종합 폼 예제 --/>
          <section class="guide-section" aria-labelledby="guide-form-heading">
            <h2 id="guide-form-heading">8. 종합 폼 예제</h2>
            <form action="#" method="get" novalidate aria-labelledby="guide-form-heading">
              <div class="form-group">
                <label class="label label-required" for="g-name">이름</label>
                <input type="text" id="g-name" class="input input-md" placeholder="홍길동" required autocomplete="name" aria-required="true" aria-describedby="g-name-desc">
                <span id="g-name-desc" class="help-text">실명을 입력해주세요.</span>
              </div>
              <div class="form-group">
                <label class="label" for="g-email">이메일</label>
                <input type="email" id="g-email" class="input input-md" placeholder="email@example.com" autocomplete="email">
              </div>
              <fieldset class="form-group">
                <legend class="label">성별</legend>
                <div class="radio-group radio-group-inline" role="radiogroup" aria-label="성별 선택">
                  <label class="radio">
                    <input type="radio" name="g-gender" class="radio-input" value="male">
                    <span class="radio-button"></span>
                    <span class="radio-label">남성</span>
                  </label>
                  <label class="radio">
                    <input type="radio" name="g-gender" class="radio-input" value="female">
                    <span class="radio-button"></span>
                    <span class="radio-label">여성</span>
                  </label>
                </div>
              </fieldset>
              <div class="form-group">
                <label class="checkbox">
                  <input type="checkbox" class="checkbox-input" name="g-agree" value="1" aria-describedby="g-agree-desc">
                  <span class="checkbox-box"></span>
                  <span class="checkbox-label">이용약관에 동의합니다</span>
                </label>
                <span id="g-agree-desc" class="help-text" hidden>필수 동의 항목</span>
              </div>
              <div class="guide-row">
                <div class="guide-items">
                  <button type="submit" class="btn btn-primary btn-md">제출하기</button>
                  <button type="reset" class="btn btn-outline btn-md">초기화</button>
                </div>
              </div>
            </form>
          </section>
        -->
        </main>
      </div>
    </div>
  </body>
</html>
