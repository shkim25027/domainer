<!DOCTYPE html>
<html lang="ko">
  <head>
    @@include("_include/_head.html")
    <title>컴포넌트 가이드 — Domainer</title>
    <style>

      .guide { width: 100%; max-width: 100%; max-height: 100vh; margin: 0 auto; padding: 2rem 1.5rem; overflow-y: auto; }
      .guide h1 { font-size: 2rem; margin: 0 0 2rem; color: var(--text-title); }
      .guide-section {
        padding: 1.5rem 2rem;
        margin-bottom: 2rem;
        background: #fff;
        border-radius: 8px;
        border: 1px solid var(--border-base, #e5e7eb);
      }
      .guide-section:last-of-type { margin-bottom: 0; }
      .guide-section h2 { font-size: 1.5rem; margin: 0 0 1.25rem; color: var(--text-title); font-weight: 600; }
      .guide-section h3 { font-size: 1.125rem; margin: 1.25rem 0 0.75rem; color: var(--text-title); font-weight: 600; }
      .guide-section h3:first-of-type { margin-top: 0; }
      .guide-grid {
        display: grid;
        grid-template-columns: 20% 80%;
        gap: 2rem;
        width: 100%;
      }
      .guide-grid-item {
        padding: 1.5rem 2rem;
      }
      .guide-row { display: flex; flex-wrap: wrap; align-items: center; gap: 1rem; margin-bottom: 1rem; }
      .guide-row:last-child { margin-bottom: 0; }
      .guide-label { min-width: 160px; font-size: 0.8125rem; color: var(--text-tertiary); }
      .guide-items { display: flex; flex-wrap: wrap; align-items: center; gap: 0.75rem 1rem; }
      .skip-link {
        position: absolute;
        top: -10rem;
        left: 1rem;
        z-index: 9999;
        padding: 0.75rem 1rem;
        background: var(--text-primary, #246beb);
        color: #fff;
        font-size: 0.875rem;
        text-decoration: none;
        border-radius: 4px;
        transition: top 0.2s;
      }
      .skip-link:focus {
        top: 1rem;
        outline: 3px solid currentColor;
        outline-offset: 2px;
      }
      .card-title { margin: 0; font: inherit; font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="wrap">
      @@include("_include/_sidebar.html")
      <div class="container">
        <main id="guide-main" class="guide" role="main" aria-label="컴포넌트 가이드">
          <h1>컴포넌트 가이드 — 한눈에 보기</h1>
          <!-- 1. 폰트 사이즈 -->
          <section class="guide-section" aria-labelledby="guide-font-size-heading">
            <h2 id="guide-font-size-heading">1. 폰트 사이즈</h2>
            <div class="guide-row">
              <div class="guide-items">
                <div>
                  <!--<h1 class="text-title-1">title h1 - 32px</h1>
                  <h2 class="text-title-2">title h2 - 24px</h2>-->
                  <h3 class="text-title-3" style="color: var(--text-title);">title h3 - 18px</h3>
                  <p class="text-lg">p - 16px</p>
                  <p class="text-base">p - 14px</p>
                  <p class="text-sm">p - 13px</p>
                  <!-- <p class="text-xs">p - 12px</p> -->
                </div>
              </div>
            </div>
          </section>

          <!-- 2. 입력 필드 -->
          <section class="guide-section" aria-labelledby="guide-input-heading">
            <h2 id="guide-input-heading">2. 입력 필드 (Input)</h2>
            <h3>기본</h3>
            <div class="form-group">
              <div class="form-group-item">
                <label class="label" for="g-input1">이름</label>
                <input type="text" id="g-input1" class="input input-lg" placeholder="이름을 입력하세요" autocomplete="name">
              </div>
            </div>
            <h3>사이즈</h3>
            <div class="guide-row">
              <div class="guide-items">
                <input type="text" class="input input-xs" placeholder="xSmall" aria-label="xSmall 크기 입력">
                <input type="text" class="input input-sm" placeholder="Small" aria-label="Small 크기 입력">
                <input type="text" class="input input-md" placeholder="Medium" aria-label="Medium 크기 입력">
                <input type="text" class="input input-lg" placeholder="Large" aria-label="Large 크기 입력">
                <input type="text" class="input" placeholder="Full" aria-label="기본 크기 입력">
              </div>
            </div>
            <h3>상태</h3>
            <div class="guide-row">
              <div class="guide-items">
                <input type="text" class="input input-md input-error" placeholder="Error" aria-label="오류 상태 예시" aria-invalid="true">
                <input type="text" class="input input-md input-success" value="Success" aria-label="성공 상태 예시">
                <input type="text" class="input input-md" placeholder="Disabled" disabled aria-label="비활성화 상태 예시">
              </div>
            </div>
            <h3>Textarea</h3>
            <div class="guide-row">
              <div class="form-group">
                <label class="label" for="g-textarea1">메시지 (기본)</label>
                <textarea id="g-textarea1" class="textarea" placeholder="메시지를 입력하세요" rows="3" aria-describedby="g-textarea-desc1"></textarea>
                <span id="g-textarea-desc1" class="help-text" hidden>3줄 이상 입력 가능</span>
              </div>
              <div class="form-group">
                <label class="label" for="g-textarea2">메시지 (no-resize)</label>
                <textarea id="g-textarea2" class="textarea textarea-no-resize" placeholder="메시지를 입력하세요" rows="3" aria-describedby="g-textarea-desc2"></textarea>
                <span id="g-textarea-desc2" class="help-text" hidden>3줄 이상 입력 가능</span>
              </div>
            </div>
            <h3>Select</h3>
            <div class="guide-row">
              <div class="form-group">
                <div class="form-group-item">
                  <label class="label" for="g-select2">옵션 (sm)</label>
                  <select id="g-select2" class="select select-sm" aria-label="옵션 선택 sm">
                    <option value="">선택하세요</option>
                    <option value="1">옵션 1</option>
                    <option value="2">옵션 2</option>
                  </select>
                </div>
                <div class="form-group-item">
                  <label class="label" for="g-select3">옵션 (md)</label>
                  <select id="g-select3" class="select select-md" aria-label="옵션 선택 md">
                    <option value="">선택하세요</option>
                    <option value="1">옵션 1</option>
                    <option value="2">옵션 2</option>
                  </select>
                </div>
                <div class="form-group-item">
                  <label class="label" for="g-select4">옵션 (lg)</label>
                  <select id="g-select4" class="select select-lg" aria-label="옵션 선택 lg">
                    <option value="">선택하세요</option>
                    <option value="1">옵션 1</option>
                    <option value="2">옵션 2</option>
                  </select>
                </div>
              </div>
              <div class="form-group" style="width: 100%;">
                <div class="form-group-item">
                  <label class="label" for="g-select5">옵션</label>
                  <select id="g-select5" class="select" aria-label="옵션 선택 full">
                    <option value="">선택하세요</option>
                    <option value="1">옵션 1</option>
                    <option value="2">옵션 2</option>
                  </select>
                </div>
              </div>
            </div>
          </section>

        </main>
      </div>
    </div>
  </body>
</html>
