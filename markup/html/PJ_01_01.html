    <script>
      // 커스텀 셀렉트는 공통 custom-select.js에서 처리 (DOMContentLoaded + MutationObserver)

      // 모달 열기 : [data-modal-open="modalId"] 버튼
      document.querySelectorAll('[data-modal-open]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var id = btn.getAttribute('data-modal-open');
          document.getElementById(id).classList.add('is-open');
        });
      });

      // 모달 닫기 : .modal-close 버튼 또는 오버레이 클릭
      document.querySelectorAll('.modal').forEach(function(modal) {
        // X 버튼
        var closeBtn = modal.querySelector('.modal-close');
        if (closeBtn) {
          closeBtn.addEventListener('click', function() {
            modal.classList.remove('is-open');
          });
        }
        // 오버레이(배경) 클릭
        modal.addEventListener('click', function(e) {
          if (e.target === modal) modal.classList.remove('is-open');
        });
      });

      // =============================================
      // 주요시설물: + 시설물 추가 / select 변경 / 삭제
      // =============================================
      (function() {
        var SELECT_OPTIONS = ['나들목', '분기점', '교량', '터널'];

        // select 타입에 따른 입력 영역 HTML (form-row-inline flex-1)
        function getFieldHTML(type, removable) {
          var removeBtn = removable ? '<button type="button" class="btn btn-remove btn-xs">—</button>' : '';
          if (type === '교량' || type === '터널') {
            return '<div class="form-row-inline flex-1 ">'
              +'<div class="form-row-inline gap-1  flex-1">'
              + '<input type="number" placeholder="0">'
              + '<span class="unit">개소</span>'
              + '</div><div class="form-row-inline gap-1  flex-1">'
              + '<input type="number" placeholder="0.00">'
              + '<span class="unit">km</span>'
              + removeBtn
              + '</div></div>';
          }
          return '<div class="form-row-inline flex-1 gap-2">'
            + '<input type="text" placeholder="시설명, 구분">'
            + removeBtn
            + '</div>';
        }

        // 전체 select 옵션 HTML (특정 값 selected)
        function getSelectHTML(selected) {
          var ph = '<option value="" disabled hidden' + (!selected ? ' selected' : '') + '>종류</option>';
          return ph + SELECT_OPTIONS.map(function(opt) {
            return '<option' + (opt === selected ? ' selected' : '') + '>' + opt + '</option>';
          }).join('');
        }

        var group = document.getElementById('facilityGroup');
        if (!group) return;

        // + 시설물 버튼 (.title-box는 .panel-body 형제이므로 .panel 기준으로 탐색)
        var addBtn = group.closest('.panel').querySelector('.btn-add-primary');
        if (addBtn) {
          addBtn.addEventListener('click', function() {
            var row = document.createElement('div');
            row.className = 'form-row-inline gap-2';
            row.innerHTML = '<select class="select-md">' + getSelectHTML('') + '</select>'
              + getFieldHTML('', true);
            group.appendChild(row);
          });
        }

        // select 변경: 종류에 따라 입력 영역 교체
        group.addEventListener('change', function(e) {
          if (e.target.tagName !== 'SELECT') return;
          var row = e.target.closest('.form-row-inline');
          var isFirst = row === group.querySelector('.form-row-inline');
          // 커스텀 셀렉트 사용 시 select는 .ms-wrap 안에 있으므로, 입력 영역은 .ms-wrap 다음 형제
          var wrap = e.target.closest('.ms-wrap');
          var oldField = wrap ? wrap.nextElementSibling : e.target.nextElementSibling;
          if (!oldField) return;
          var tmp = document.createElement('div');
          tmp.innerHTML = getFieldHTML(e.target.value, !isFirst);
          oldField.replaceWith(tmp.firstElementChild);
        });

        // 삭제 버튼 (이벤트 위임)
        group.addEventListener('click', function(e) {
          var btn = e.target.closest('.btn-remove');
          if (!btn) return;
          // btn-remove는 내부 입력영역(.form-row-inline.flex-1)에도 있어
          // 가장 가까운 .form-row-inline을 지우면 셀렉트(.ms-wrap)만 남을 수 있음.
          // facilityGroup의 "직계 자식 행"을 찾아 제거한다.
          var row = btn.closest('.form-row-inline');
          while (row && row.parentElement !== group) {
            row = row.parentElement ? row.parentElement.closest('.form-row-inline') : null;
          }
          if (row && row.parentElement === group) {
            row.remove();
            if (group.querySelectorAll(':scope > .form-row-inline').length === 0) {
              var newRow = document.createElement('div');
              newRow.className = 'form-row-inline';
              newRow.innerHTML = '<select class="select-md">' + getSelectHTML('') + '</select>' + getFieldHTML('', true);
              group.appendChild(newRow);
            }
          }
        });
      })();

      // =============================================
      // 공구 관리: + 공구 추가 / 공구 삭제 / + 인원 추가 / 인원 삭제
      // =============================================
      (function() {
        var panelBody = document.getElementById('gongguPanelBody');
        if (!panelBody) return;

        var PERSON_ROW =
          '<div class="data-row" style="display: contents;">'
          + '<div class="data-td"><input type="text" class="input-center" placeholder="부서명"></div>'
          + '<div class="data-td"><input type="text" class="input-center" placeholder="담당자"></div>'
          + '<div class="data-td"><input type="text" class="input-center" placeholder="전화번호"></div>'
          + '<div class="data-td"><input type="text" class="input-center" placeholder="your@email.com"></div>'
          + '<div class="data-td"><button type="button" class="btn btn-remove btn-xs">—</button></div>'
          + '</div>';

        function createFormArea() {
          var el = document.createElement('div');
          el.className = 'form-area';
          el.innerHTML =
            '<div class="form-table form-auto">'
            + '<div class="form-row-inline">'
            + '<div class="form-row"><div class="form-cell"><div class="form-row-inline gap-1">'
            + '<input class="input-auto" type="text" placeholder="공구명">'
            + '<span class="input-label">공구</span>'
            + '</div></div></div>'
            + '<div class="form-row form-fix"><div class="form-th auto-width">업체명</div><div class="form-cell"><div class="form-row-inline gap-2">'
            + '<input class="input-lg" type="text" placeholder="업체명">'
            + '<button type="button" class="btn btn-remove btn-xs">—</button>'
            + '</div></div></div>'
            + '</div>'
            + '<div class="form-row-inline">'
            + '<div class="form-row flex-1"><div class="form-th">공사구간</div><div class="form-cell"><div class="form-row-inline gap-1">'
            + '<input type="text" placeholder="시점(읍·면·동·리)"><span class="sep">~</span><input type="text" placeholder="종점(읍·면·동·리)">'
            + '</div></div></div>'
            + '<div class="form-row-inline"><div class="form-th fw-medium auto-width">STA.</div><div class="form-cell"><div class="form-row-inline gap-1">'
            + '<input type="text" value="" placeholder="0+000" class="input-md"><span class="sep">~</span><input type="text" value="" placeholder="0+000" class="input-md">'
            + '</div></div></div>'
            + '</div>'
            + '</div>'
            + '<div class="data-table" style="display: grid; grid-template-columns: 1fr 1fr 1fr 2fr 80px;">'
            + '<div class="data-thead" style="display: contents;"><div class="data-row" style="display: contents;">'
            + '<div class="data-th">부서</div><div class="data-th">담당자</div>'
            + '<div class="data-th">전화번호</div><div class="data-th">메일 주소</div>'
            + '<div class="data-th"><button type="button" class="btn btn-add-person btn-xs">+ 인원</button></div>'
            + '</div></div>'
            + '<div class="data-tbody" style="display: contents;">' + PERSON_ROW + '</div>'
            + '</div>';
          return el;
        }

        // + 공구 버튼 (.title-box는 .panel-body 형제이므로 .panel 기준으로 탐색)
        var addGongguBtn = panelBody.closest('.panel').querySelector('.title-box .btn-add-primary');
        if (addGongguBtn) addGongguBtn.addEventListener('click', function() {
          panelBody.appendChild(createFormArea());
        });

        // 이벤트 위임 (공구 삭제 / + 인원 / 인원 삭제)
        panelBody.addEventListener('click', function(e) {
          // + 인원 버튼
          var addPersonBtn = e.target.closest('.btn-add-person');
          if (addPersonBtn) {
            var tbody = addPersonBtn.closest('.data-table').querySelector('.data-tbody');
            var tmp = document.createElement('div');
            tmp.innerHTML = PERSON_ROW;
            tbody.appendChild(tmp.firstElementChild);
            return;
          }
          // 삭제 버튼
          var removeBtn = e.target.closest('.btn-remove');
          if (!removeBtn) return;
          if (removeBtn.closest('.data-td')) {
            // 인원 행 삭제
            var dataRow = removeBtn.closest('.data-row');
            var tbody = dataRow.parentElement;
            dataRow.remove();
            if (tbody.querySelectorAll('.data-row').length === 0) {
              var tmp = document.createElement('div');
              tmp.innerHTML = PERSON_ROW;
              tbody.appendChild(tmp.firstElementChild);
            }
          } else if (removeBtn.closest('.form-cell')) {
            // 공구 전체 삭제
            var formArea = removeBtn.closest('.form-area');
            formArea.remove();
            if (panelBody.querySelectorAll('.form-area').length === 0) {
              panelBody.appendChild(createFormArea());
            }
          }
        });
      })();

      // .input-datepicker 초기화는 공통 datepicker.js (DOMContentLoaded)에서 처리

      // ESC 키로 닫기
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          document.querySelectorAll('.modal.is-open').forEach(function(modal) {
            modal.classList.remove('is-open');
          });
        }
      });
    </script>

  </body>
</html>
